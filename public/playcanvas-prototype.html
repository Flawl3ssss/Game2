<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#9ed8ff" />
  <title>Снежный Разгон — PlayCanvas Prototype</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #9ed8ff; touch-action: none; }
    #application { display: block; width: 100%; height: 100%; }
    #hud { position: fixed; inset: 0; pointer-events: none; padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left)); }
    #topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .pill { min-width: 92px; padding: 10px 13px; border-radius: 16px; background: rgba(4, 17, 34, .68); backdrop-filter: blur(9px); box-shadow: 0 8px 24px rgba(0, 25, 60, .22); font-weight: 800; line-height: 1.05; }
    .label { display: block; margin-bottom: 4px; color: rgba(255,255,255,.68); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; }
    #hint { position: absolute; left: 50%; bottom: max(20px, env(safe-area-inset-bottom)); transform: translateX(-50%); width: min(88vw, 390px); padding: 11px 16px; border-radius: 18px; text-align: center; background: rgba(4, 17, 34, .62); color: rgba(255,255,255,.86); font-size: 13px; backdrop-filter: blur(9px); transition: opacity .35s ease; }
    #overlay { position: fixed; inset: 0; display: grid; place-items: center; padding: 24px; background: linear-gradient(rgba(38, 133, 196, .18), rgba(2, 16, 35, .74)); }
    #card { width: min(92vw, 420px); padding: 26px; border-radius: 28px; text-align: center; background: rgba(5, 20, 38, .82); box-shadow: 0 30px 90px rgba(0,0,0,.35); backdrop-filter: blur(14px); }
    h1 { margin: 0 0 10px; font-size: clamp(30px, 9vw, 48px); line-height: .96; }
    p { margin: 0 0 20px; color: rgba(255,255,255,.76); line-height: 1.45; }
    button { width: 100%; min-height: 56px; border: 0; border-radius: 18px; background: white; color: #09213a; font: inherit; font-size: 17px; font-weight: 900; cursor: pointer; }
    #error { display: none; position: fixed; inset: 16px; z-index: 10; overflow: auto; padding: 18px; border-radius: 18px; background: #401313; color: white; white-space: pre-wrap; }
  </style>
</head>
<body>
  <canvas id="application"></canvas>
  <div id="hud">
    <div id="topbar">
      <div class="pill"><span class="label">Дистанция</span><span id="distance">0 м</span></div>
      <div class="pill"><span class="label">Монеты</span><span id="coins">0</span></div>
    </div>
    <div id="hint">Веди пальцем влево и вправо</div>
  </div>
  <div id="overlay">
    <div id="card">
      <h1 id="title">Снежный Разгон</h1>
      <p id="subtitle">Мобильный прототип на PlayCanvas. Уклоняйся от препятствий и собирай монеты.</p>
      <button id="start">СТАРТ</button>
    </div>
  </div>
  <pre id="error"></pre>

  <script src="https://cdn.jsdelivr.net/npm/playcanvas/build/playcanvas.min.js"></script>
  <script>
    (() => {
      const errorBox = document.getElementById('error');
      const showError = (error) => {
        errorBox.style.display = 'block';
        errorBox.textContent = String(error && error.stack ? error.stack : error);
      };
      window.addEventListener('error', (event) => showError(event.error || event.message));
      window.addEventListener('unhandledrejection', (event) => showError(event.reason));

      try {
        if (!window.pc) throw new Error('PlayCanvas Engine не загрузился. Проверь подключение к интернету.');

        const canvas = document.getElementById('application');
        const app = new pc.Application(canvas, {
          mouse: new pc.Mouse(canvas),
          touch: pc.platform.touch ? new pc.TouchDevice(canvas) : undefined,
          keyboard: new pc.Keyboard(window),
          graphicsDeviceOptions: {
            antialias: true,
            alpha: false,
            powerPreference: 'high-performance'
          }
        });

        app.setCanvasFillMode(pc.FILLMODE_FILL_WINDOW);
        app.setCanvasResolution(pc.RESOLUTION_AUTO);
        app.scene.ambientLight = new pc.Color(0.72, 0.78, 0.88);
        app.scene.gammaCorrection = pc.GAMMA_SRGB;
        app.scene.toneMapping = pc.TONEMAP_ACES;
        app.start();

        const makeMaterial = (r, g, b, metallic = 0, gloss = 0.35) => {
          const material = new pc.StandardMaterial();
          material.diffuse = new pc.Color(r, g, b);
          material.metalness = metallic;
          material.gloss = gloss;
          material.update();
          return material;
        };

        const snowMaterial = makeMaterial(0.91, 0.96, 1.0, 0, 0.22);
        const sledMaterial = makeMaterial(0.93, 0.08, 0.08, 0.08, 0.55);
        const darkMaterial = makeMaterial(0.06, 0.11, 0.17, 0.15, 0.42);
        const woodMaterial = makeMaterial(0.32, 0.16, 0.06, 0, 0.18);
        const pineMaterial = makeMaterial(0.03, 0.24, 0.14, 0, 0.16);
        const rockMaterial = makeMaterial(0.31, 0.36, 0.43, 0, 0.12);
        const coinMaterial = makeMaterial(1.0, 0.64, 0.02, 0.62, 0.78);

        const createPrimitive = (name, type, material, scale, position, parent = app.root) => {
          const entity = new pc.Entity(name);
          entity.addComponent('render', { type });
          entity.render.material = material;
          entity.setLocalScale(scale.x, scale.y, scale.z);
          entity.setLocalPosition(position.x, position.y, position.z);
          parent.addChild(entity);
          return entity;
        };

        const camera = new pc.Entity('Camera');
        camera.addComponent('camera', {
          clearColor: new pc.Color(0.42, 0.74, 0.94),
          farClip: 180,
          fov: 56
        });
        camera.setPosition(0, 6.2, 12.5);
        camera.setEulerAngles(-18, 0, 0);
        app.root.addChild(camera);

        const sun = new pc.Entity('Sun');
        sun.addComponent('light', {
          type: 'directional',
          color: new pc.Color(1, 0.96, 0.9),
          intensity: 1.45,
          castShadows: true,
          shadowBias: 0.25,
          shadowDistance: 70,
          shadowResolution: 1024
        });
        sun.setEulerAngles(42, 28, 0);
        app.root.addChild(sun);

        const sled = new pc.Entity('Sled');
        app.root.addChild(sled);
        createPrimitive('Body', 'box', sledMaterial, new pc.Vec3(1.35, 0.28, 2.35), new pc.Vec3(0, 0.55, 0), sled);
        createPrimitive('Seat', 'box', darkMaterial, new pc.Vec3(0.92, 0.26, 0.95), new pc.Vec3(0, 0.83, 0.22), sled);
        createPrimitive('RunnerLeft', 'box', darkMaterial, new pc.Vec3(0.12, 0.12, 2.62), new pc.Vec3(-0.55, 0.27, 0), sled);
        createPrimitive('RunnerRight', 'box', darkMaterial, new pc.Vec3(0.12, 0.12, 2.62), new pc.Vec3(0.55, 0.27, 0), sled);
        sled.setPosition(0, 0, 2.3);

        const chunkLength = 22;
        const chunkCount = 7;
        const chunks = [];
        const coins = [];
        const obstacles = [];

        const seeded = (seed) => {
          let value = seed >>> 0;
          return () => {
            value = (value * 1664525 + 1013904223) >>> 0;
            return value / 4294967296;
          };
        };

        const rebuildChunk = (chunk, absoluteIndex) => {
          chunk.absoluteIndex = absoluteIndex;
          const random = seeded(absoluteIndex * 7919 + 113);
          for (const item of chunk.items) item.enabled = false;

          let itemCursor = 0;
          const takeItem = () => chunk.items[itemCursor++];

          for (let row = 0; row < 5; row++) {
            const z = -8 + row * 3.6;
            if (random() > 0.28) {
              const coin = takeItem();
              coin.enabled = true;
              coin.tags.add('coin');
              coin.setLocalPosition((random() - 0.5) * 7.2, 0.95, z);
              coin.setLocalEulerAngles(90, 0, 0);
              coin.collected = false;
            }
          }

          if (absoluteIndex > 0) {
            const obstacle = takeItem();
            obstacle.enabled = true;
            obstacle.tags.add('obstacle');
            obstacle.setLocalPosition((random() - 0.5) * 7.4, 0.65, -1 + (random() - 0.5) * 7);
            obstacle.setLocalEulerAngles(0, random() * 180, random() * 12);
          }

          for (let side = -1; side <= 1; side += 2) {
            for (let i = 0; i < 3; i++) {
              const tree = takeItem();
              tree.enabled = true;
              tree.tags.add('decor');
              tree.setLocalPosition(side * (5.6 + random() * 2.4), 0.8, -8 + i * 7 + random() * 2);
            }
          }
        };

        const createChunk = (slot) => {
          const root = new pc.Entity('Chunk-' + slot);
          app.root.addChild(root);
          createPrimitive('Snow', 'box', snowMaterial, new pc.Vec3(12.8, 0.5, chunkLength), new pc.Vec3(0, -0.36, 0), root);
          const items = [];

          for (let i = 0; i < 7; i++) {
            const coin = createPrimitive('Coin-' + i, 'cylinder', coinMaterial, new pc.Vec3(0.48, 0.12, 0.48), new pc.Vec3(0, 0, 0), root);
            coin.enabled = false;
            coins.push(coin);
            items.push(coin);
          }

          for (let i = 0; i < 2; i++) {
            const rock = createPrimitive('Rock-' + i, 'sphere', rockMaterial, new pc.Vec3(1.15, 0.85, 1.0), new pc.Vec3(0, 0, 0), root);
            rock.enabled = false;
            obstacles.push(rock);
            items.push(rock);
          }

          for (let i = 0; i < 6; i++) {
            const tree = new pc.Entity('Pine-' + i);
            root.addChild(tree);
            createPrimitive('Trunk', 'cylinder', woodMaterial, new pc.Vec3(0.28, 1.5, 0.28), new pc.Vec3(0, 0.7, 0), tree);
            createPrimitive('CrownLow', 'cone', pineMaterial, new pc.Vec3(1.6, 2.0, 1.6), new pc.Vec3(0, 2.0, 0), tree);
            createPrimitive('CrownHigh', 'cone', pineMaterial, new pc.Vec3(1.1, 1.65, 1.1), new pc.Vec3(0, 3.1, 0), tree);
            tree.enabled = false;
            items.push(tree);
          }

          const chunk = { root, items, absoluteIndex: slot };
          root.setPosition(0, 0, -slot * chunkLength);
          rebuildChunk(chunk, slot);
          return chunk;
        };

        for (let i = 0; i < chunkCount; i++) chunks.push(createChunk(i));

        const state = {
          running: false,
          gameOver: false,
          targetX: 0,
          playerX: 0,
          speed: 10.5,
          distance: 0,
          coinCount: 0,
          nextChunkIndex: chunkCount
        };

        const distanceText = document.getElementById('distance');
        const coinText = document.getElementById('coins');
        const overlay = document.getElementById('overlay');
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');
        const startButton = document.getElementById('start');
        const hint = document.getElementById('hint');

        const reset = () => {
          state.gameOver = false;
          state.targetX = 0;
          state.playerX = 0;
          state.speed = 10.5;
          state.distance = 0;
          state.coinCount = 0;
          state.nextChunkIndex = chunkCount;
          sled.setPosition(0, 0, 2.3);
          sled.setEulerAngles(0, 0, 0);
          chunks.forEach((chunk, index) => {
            chunk.root.setPosition(0, 0, -index * chunkLength);
            rebuildChunk(chunk, index);
          });
          distanceText.textContent = '0 м';
          coinText.textContent = '0';
        };

        const startGame = () => {
          reset();
          state.running = true;
          overlay.style.display = 'none';
          hint.style.opacity = '1';
          setTimeout(() => { hint.style.opacity = '0'; }, 2600);
        };

        const endGame = () => {
          state.running = false;
          state.gameOver = true;
          title.textContent = 'Столкновение';
          subtitle.textContent = `Дистанция: ${Math.floor(state.distance)} м · Монеты: ${state.coinCount}`;
          startButton.textContent = 'ЕЩЁ РАЗ';
          overlay.style.display = 'grid';
        };

        startButton.addEventListener('click', startGame);

        let pointerDown = false;
        const setTargetFromPointer = (event) => {
          const rect = canvas.getBoundingClientRect();
          const normalized = ((event.clientX - rect.left) / rect.width) * 2 - 1;
          state.targetX = pc.math.clamp(normalized * 5.0, -4.7, 4.7);
        };
        canvas.addEventListener('pointerdown', (event) => {
          pointerDown = true;
          canvas.setPointerCapture?.(event.pointerId);
          setTargetFromPointer(event);
        });
        canvas.addEventListener('pointermove', (event) => {
          if (pointerDown) setTargetFromPointer(event);
        });
        canvas.addEventListener('pointerup', () => { pointerDown = false; });
        canvas.addEventListener('pointercancel', () => { pointerDown = false; });

        const worldPosition = new pc.Vec3();
        app.on('update', (dt) => {
          const safeDt = Math.min(dt, 1 / 20);
          if (!state.running) {
            sled.rotateLocal(0, Math.sin(performance.now() * 0.0015) * safeDt * 2, 0);
            coins.forEach((coin) => { if (coin.enabled) coin.rotateLocal(0, 110 * safeDt, 0); });
            return;
          }

          state.speed = Math.min(24, state.speed + safeDt * 0.32);
          state.distance += state.speed * safeDt;
          state.playerX += (state.targetX - state.playerX) * Math.min(1, safeDt * 8.5);
          sled.setPosition(state.playerX, 0, 2.3);
          sled.setLocalEulerAngles(0, 0, (state.targetX - state.playerX) * -5.5);

          let furthestZ = Infinity;
          for (const chunk of chunks) furthestZ = Math.min(furthestZ, chunk.root.getPosition().z);

          for (const chunk of chunks) {
            chunk.root.translateLocal(0, 0, state.speed * safeDt);
            if (chunk.root.getPosition().z > chunkLength) {
              chunk.root.setPosition(0, 0, furthestZ - chunkLength);
              furthestZ -= chunkLength;
              rebuildChunk(chunk, state.nextChunkIndex++);
            }
          }

          for (const coin of coins) {
            if (!coin.enabled || coin.collected) continue;
            coin.rotateLocal(0, 180 * safeDt, 0);
            coin.getPosition(worldPosition);
            if (Math.abs(worldPosition.z - 2.3) < 0.9 && Math.abs(worldPosition.x - state.playerX) < 0.82) {
              coin.collected = true;
              coin.enabled = false;
              state.coinCount += 1;
              coinText.textContent = String(state.coinCount);
            }
          }

          for (const obstacle of obstacles) {
            if (!obstacle.enabled) continue;
            obstacle.getPosition(worldPosition);
            if (Math.abs(worldPosition.z - 2.3) < 1.05 && Math.abs(worldPosition.x - state.playerX) < 1.02) {
              endGame();
              break;
            }
          }

          distanceText.textContent = `${Math.floor(state.distance)} м`;
        });

        window.addEventListener('resize', () => app.resizeCanvas());
        document.addEventListener('visibilitychange', () => {
          if (document.hidden && state.running) state.running = false;
        });
      } catch (error) {
        showError(error);
      }
    })();
  </script>
</body>
</html>
